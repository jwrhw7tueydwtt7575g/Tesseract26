apiVersion: apps/v1
kind: Deployment
metadata:
  name: log-generator
  namespace: default
  labels:
    app: log-generator
spec:
  replicas: 1
  selector:
    matchLabels:
      app: log-generator
  template:
    metadata:
      labels:
        app: log-generator
    spec:
      containers:
      - name: log-generator
        image: python:3.11-slim
        imagePullPolicy: IfNotPresent
        command: ["/bin/sh", "-c"]
        args:
          - |
            pip install --no-cache-dir pyyaml requests &&
            python /scripts/log_generator.py
        volumeMounts:
        - name: log-generator-script
          mountPath: /scripts
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        restartPolicy: Always
      volumes:
      - name: log-generator-script
        configMap:
          name: log-generator-config
          defaultMode: 0755
